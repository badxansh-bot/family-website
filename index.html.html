<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Like Me? ❤️ Decision Maker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideInDown 1s ease-out;
        }

        .header h1 {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .subtitle {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.9);
            font-weight: 300;
            margin-bottom: 10px;
        }

        .decision-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 60px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 200px;
            animation: slideInUp 1s ease-out 0.3s both;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            box-shadow: 0 15px 35px rgba(255,107,107,0.4);
        }

        .btn-yes:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 25px 50px rgba(255,107,107,0.6);
        }

        .btn-no {
            background: linear-gradient(45deg, #54a0ff, #2e86de);
            color: white;
            box-shadow: 0 15px 35px rgba(84,160,255,0.4);
        }

        .btn-no:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 25px 50px rgba(84,160,255,0.6);
        }

        .result {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
            animation: bounceIn 0.8s ease-out;
        }

        .emoji {
            font-size: 8rem;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px currentColor);
            animation: pulse 2s infinite;
        }

        .result-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-yes .result-title {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-no .result-title {
            background: linear-gradient(45deg, #54a0ff, #5f27cd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-text {
            font-size: 1.3rem;
            line-height: 1.6;
            text-align: center;
            max-width: 600px;
            color: rgba(255,255,255,0.95);
            font-weight: 400;
            margin-bottom: 30px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 3s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .reset-btn {
            padding: 15px 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        /* Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .decision-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 250px;
            }
            
            .emoji {
                font-size: 5rem;
            }
            
            .result-title {
                font-size: 2rem;
            }
        }

        .honesty-meter {
            margin-top: 20px;
            text-align: center;
        }

        .honesty-bar {
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px auto;
        }

        .honesty-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            border-radius: 5px;
            transition: width 2s ease-out;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <h1>Do You Like Me?</h1>
            <p class="subtitle">Make the hardest decision of your life</p>
            <div class="honesty-meter" id="honestyMeter" style="display: none;">
                <p>Honesty Level</p>
                <div class="honesty-bar">
                    <div class="honesty-fill" id="honestyFill"></div>
                </div>
            </div>
        </div>

        <div class="decision-buttons" id="decisionButtons">
            <button class="btn btn-yes" onclick="showResult('yes')">😍 YES</button>
            <button class="btn btn-no" onclick="showResult('no')">😢 NO</button>
        </div>

        <div class="result" id="result">
            <!-- Results will be populated by JavaScript -->
        </div>
    </div>

    <script>
        let currentResult = '';

        function showResult(type) {
            const buttons = document.getElementById('decisionButtons');
            const result = document.getElementById('result');
            const honestyMeter = document.getElementById('honestyMeter');
            
            buttons.style.opacity = '0';
            buttons.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                buttons.style.display = 'none';
                result.innerHTML = getResultHTML(type);
                result.classList.add('show');
                
                if (type === 'no') {
                    honestyMeter.style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('honestyFill').style.width = '100%';
                    }, 500);
                }
                
                createParticles();
            }, 500);
        }

        function getResultHTML(type) {
            if (type === 'yes') {
                return `
                    <div class="emoji">💖✨</div>
                    <div class="result-title result-yes">YASSS! I KNEW IT! 😍</div>
                    <div class="result-text">
                        My heart just did 10 cartwheels! 🥰 You're the best thing since sliced bread 
                        and unlimited WiFi. Let's celebrate with virtual hugs and maybe some ice cream? 🍦💃
                    </div>
                    <button class="reset-btn" onclick="reset()">Try Again? 😏</button>
                `;
            } else {
                return `
                    <div class="emoji">💔😭</div>
                    <div class="result-title result-no">To Be Honest... You're Breaking My Heart 💔</div>
                    <div class="result-text">
                        Ouch! That hurt more than stepping on Lego barefoot! 😢<br><br>
                        
                        But real talk? I respect your honesty 1000%. 🥺<br>
                        Maybe I'm not your cup of tea, but I'm somebody's espresso shot! ☕<br><br>
                        
                        <strong>No hard feelings, promise! 🤝</strong><br>
                        Life's too short for fake smiles anyway. Keep being real! ✨
                    </div>
                    <button class="reset-btn" onclick="reset()">Be Brave Again? 💪</button>
                `;
            }
        }

        function reset() {
            const result = document.getElementById('result');
            const buttons = document.getElementById('decisionButtons');
            const honestyMeter = document.getElementById('honestyMeter');
            
            result.classList.remove('show');
            result.innerHTML = '';
            
            setTimeout(() => {
                buttons.style.display = 'flex';
                buttons.style.opacity = '1';
                buttons.style.transform = 'scale(1)';
                honestyMeter.style.display = 'none';
                document.getElementById('honestyFill').style.width = '0%';
            }, 300);
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 2 + 's';
                    particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    particlesContainer.appendChild(particle);

                    setTimeout(() => {
                        particle.remove();
                    }, 5000);
                }, i * 50);
            }
        }

        // Add some interactive hover effects
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.body.style.background = `
                linear-gradient(${90 + x * 30}deg, 
                    hsl(${240 + x * 60}, 50%, 55%), 
                    hsl(${300 + y * 60}, 50%, 45%))
            `;
        });

        // Easter egg: keyboard interaction
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && currentResult === '') {
                showResult(Math.random() > 0.5 ? 'yes' : 'no');
            }
        });
    </script>
</body>
</html>
